name: Deploy Shopify Live Theme

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'README.md'

permissions:
  contents: read

concurrency:
  group: shopify-live-theme
  cancel-in-progress: true

jobs:
  deploy-live:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push to live theme
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_FLAG_STORE }}
          SHOPIFY_FLAG_THEME_ID: ${{ secrets.SHOPIFY_FLAG_THEME_ID }}
        run: |
          shopify theme push \
            --store "$SHOPIFY_FLAG_STORE" \
            --theme "$SHOPIFY_FLAG_THEME_ID" \
            --allow-live \
            --path .
